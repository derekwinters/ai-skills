# Optional companion to docs-test.yml: publish the MkDocs site to GitHub Pages
# on every push to main that touches docs. Copy this to
# `.github/workflows/docs-publish.yml`, then enable Pages in the repo:
#   Settings -> Pages -> Build and deployment -> Source: GitHub Actions.
#
# This uses the official Pages deploy (single `latest` site, no versioning). If
# you want versioned docs, swap the deploy step for `mike` (see the mkdocs-material
# "Publishing your site" guide).
name: docs-publish

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs-publish.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt
      - name: Build site (strict)
        run: mkdocs build --strict
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
