# Repo config as code — the single source of truth for skill distribution.
#
# `bundles` are named sets of installable units (skills / agents / workflows).
# `repos` map each consumer repo to the bundles it installs plus that repo's
# per-repo `config` values, which parametrized skills read as `{{ config.KEY }}`.
#
# Change this file, merge it, and `skills-update.yml` (weekly) or a manual
# `skills-sync.yml` run will open a PR in each affected repo. Validated in CI by
# distribution/tests/test_sync.py.
version: 1

defaults:
  install_root: .claude            # where skills/agents land in each consumer repo
  sync_branch: claude/skills-sync  # branch the sync workflow pushes to

# ---------------------------------------------------------------------------
# Bundles. Start minimal (only the moved `ci-watch`); grow as skills land here.
# Planned bundles (tracked in the rollout epic), not yet populated:
#   spec:        validate-specs
#   lifecycle:   commit, implementation-{validate,prepare,test,verify,finalize}
#   pipeline:    pipeline-{gatekeeper,analysis,dev,dashboard} (+ their scripts/tests)
# ---------------------------------------------------------------------------
bundles:
  core:
    skills: [ci-watch]
    agents: []
    # The self-update workflow: installed into every repo so it can pull future
    # skill updates on its own schedule (Dependabot-style). Self-perpetuating —
    # once present, it re-renders itself with no diff.
    workflows: [skills-update.yml]
  # Single-issue TDD lifecycle skills. Shared bodies; per-repo commands + notes
  # come from each repo's `config` (test_command, verify_command, commit_scopes,
  # and optional *_notes). Requires config keys: test_command, verify_command,
  # commit_scopes.
  lifecycle:
    skills:
      - commit
      - implementation-validate
      - implementation-prepare
      - implementation-test
      - implementation-verify
      - implementation-finalize

  # Issue triage flow: engine skills (one job each) + review/grill entry points,
  # driven by three orchestrator agents. Only grill-with-docs is parametrized
  # (its Area Checklist / Impact Areas render from `{{ config.areas }}`); every
  # other body is shared verbatim across subscribed repos.
  triage:
    skills:
      - github-issue-categorize
      - github-issue-find-duplicates
      - github-issue-validate-bug
      - github-issue-validate-feature
      - github-issue-validate-refactor
      - github-issue-completeness
      - github-issue-label
      - github-issue-suggest-milestone
      - github-issue-review
      - grill-with-docs
    agents:
      - github-issue-triage-orchestrator
      - github-issue-implementation-orchestrator
      - milestone-implementation-orchestrator
    workflows: []

  # Spec-driven repos: the portable requirements validator + the docs-test gate.
  # Only subscribe repos that keep requirement tables in docs/spec (see below).
  spec:
    skills: [validate-specs]
    agents: []
    workflows: [docs-test.yml]

# ---------------------------------------------------------------------------
# Consumer repos. `config` values are consumed by parametrized skills so we
# ship one skill body, not N forks. `ci-watch` is static (no placeholders), so
# these values are inert today — they are seeded now for the lifecycle/commit
# bundles that will read them next.
# ---------------------------------------------------------------------------
repos:
  derekwinters/chores-web-backend:
    bundles: [core, lifecycle, triage]
    config:
      test_command: pytest
      verify_command: pytest
      areas: [api, db, auth, scheduler, services, build]
      commit_scopes: [api, db, auth, scheduler, services, build]
      test_notes: "`pytest` runs the async suite via `asyncio_mode = auto` (see `pytest.ini`); no extra markers needed."
      prepare_notes: |
        ## Alembic-migration reminder
        If the change will touch `app/models.py`, add a matching Alembic revision
        under `alembic/versions/` (`python -m alembic revision --autogenerate -m "..."`,
        see `MIGRATIONS.md`). A schema change with no migration is incomplete and is
        flagged at verify.
      verify_notes: |
           - **API contract:** regenerate the schema
             (`python scripts/generate_openapi.py --output <tmp>/openapi.json`) and diff it
             against the `chores-web-docs` golden snapshot (`docs/api/openapi.json`). On
             drift, flag it: the golden snapshot must be updated (and `API_VERSION` bumped
             for breaking changes) — see CLAUDE.md's Breaking Change Ritual.
           - **Migrations:** if `app/models.py` changed, confirm a matching revision exists
             in `alembic/versions/`. A model change with no revision is a defect — flag it.

  derekwinters/chores-web-frontend:
    bundles: [core, lifecycle, triage]
    config:
      test_command: npm test
      verify_command: npm run build
      areas: [ui, api, theming, routing, auth, build]
      commit_scopes: [ui, api, theming, routing, auth, build]
      verify_notes: |
           - **Theming:** confirm no hardcoded color values — components must use the CSS
             custom properties / `@derekwinters/design-tokens` (runtime themes override
             them). See `src/__tests__/designTokens.test.js`.

  derekwinters/chores-web-android:
    bundles: [core, lifecycle, triage]
    config:
      test_command: ./gradlew test
      verify_command: ./gradlew assembleDebug
      areas: [ui, data, network, domain, auth, build]
      commit_scopes: [ui, data, network, domain, auth, build]

  derekwinters/chores-web-docs:
    bundles: [core, lifecycle, triage]
    config:
      test_command: mkdocs build --strict
      verify_command: mkdocs build --strict
      areas: [guide, api, blog, nav]
      commit_scopes: [guide, api, blog, nav, agents]
      test_notes: "This repo has no test suite — the strict `mkdocs build` is the gate."

  derekwinters/chores-web-design-tokens:
    bundles: [core, lifecycle, triage]
    config:
      test_command: npm test
      verify_command: npm test
      areas: [tokens, themes, build, android, test]
      commit_scopes: [tokens, themes, build, android, test]
      commit_notes: |
        ## Token-change severity → commit type
        Token changes carry an enforced severity → SemVer mapping (the same table in
        `CLAUDE.md` and `README.md` — reference it, do not fork it):

        | Change | Commit type | SemVer |
        |---|---|---|
        | Token removed or renamed | `feat!:` / `BREAKING CHANGE:` footer | MAJOR |
        | Token added | `feat:` | MINOR |
        | Token value changed | `fix:` | PATCH |

        The package is `0.x` (`bump-minor-pre-major: true`), so use `feat!:` or a
        `BREAKING CHANGE:` footer for a removal/rename regardless, so history stays correct.
      verify_notes: |
           - **Artifacts:** confirm the change is present in all three build outputs —
             `dist/web/tokens.css`, `dist/web/tokens.js`, `dist/android/DesignTokens.kt`.
             If it lands in only one, that is a build-config bug.

  derekwinters/chores-web-actions:
    bundles: [core, lifecycle]
    config:
      test_command: "actionlint .github/workflows/*.yml"
      verify_command: "actionlint .github/workflows/*.yml"
      areas: [actions, workflows, agents, skills, docs, ci]
      commit_scopes: [actions, workflows, agents, skills, docs, ci]
      test_notes: "No test suite in this repo — `actionlint` (with a YAML-parse fallback) is the gate. Never emit a 'tests passed' result; record an explicit skip if lint can't run."

  derekwinters/roadtrip-backend:
    bundles: [core, spec]
    config:
      test_command: npm test
      verify_command: npm run validate:specs
      areas: [sys, evt, api, loc, geo, jrnl, game, trip]
      id_prefix: "AREA"
      spec_dir: docs/spec
      test_globs: test scripts

  derekwinters/roadtrip-android:
    bundles: [core, spec]
    config:
      test_command: "./gradlew -p core test"
      verify_command: ./scripts/validate-specs.sh
      areas: [and, andsync, andloc, andmap, andjrnl, andgame]
      id_prefix: "AND"
      spec_dir: docs/spec
      test_globs: core/src/test app/src/test

  derekwinters/lucas-doggiehood:
    bundles: [core]
    config:
      test_command: "dotnet test CoreTests/Doggiehood.Core.Tests"
      verify_command: "dotnet test CoreTests/Doggiehood.Core.Tests"
      areas: [gameplay, art, audio, ui, story, build, ai]
      commit_scopes: [gameplay, art, audio, ui, story, build, ai]
