# skills-update — the weekly "repo config as code" manager.
#
# Runs skills-sync across ALL repos in registry.yml on a schedule and opens/
# updates a sync PR wherever a repo has drifted from the canonical skills. This
# is the `gh skill update --all` equivalent (answers proposal §L0). Merging a
# change to registry.yml or to any skill and waiting for Monday is all it takes
# to fan the update out; nothing is force-applied — every repo gets a PR a human
# reviews and merges.
name: skills-update

on:
  schedule:
    # Mondays ~06:17 UTC. Off-:00 on purpose (see proposal / CronCreate notes).
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "ai-skills ref to sync from"
        default: main
        type: string

permissions:
  contents: read

jobs:
  update-all:
    uses: ./.github/workflows/skills-sync.yml
    with:
      repos: all
      ref: ${{ inputs.ref || 'main' }}
    secrets:
      SKILLS_SYNC_TOKEN: ${{ secrets.SKILLS_SYNC_TOKEN }}
