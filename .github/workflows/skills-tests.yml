# CI gate for the distribution engine + registry. Keeps registry.yml honest:
# every repo must plan cleanly (all placeholders resolvable, all bundles/skills
# present) before a change can merge.
name: skills-tests

on:
  pull_request:
    paths:
      - "distribution/**"
      - "skills/**"
      - "agents/**"
      - "workflows/**"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Unit tests + real-registry plan guard
        run: python -m unittest discover -s distribution/tests -v
